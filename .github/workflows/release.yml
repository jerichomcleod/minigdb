name: Release

# Triggered by pushing a version tag: git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - "v*"

jobs:
  # ── Build wheels for all supported platforms ─────────────────────────────
  build-wheels:
    name: Wheel — ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — built inside quay.io/pypa/manylinux_2_28_x86_64 (AlmaLinux 8).
          # The container has Python; llvm-toolset provides libclang needed by zstd-sys bindgen.
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64
            manylinux: "2_28"
            python-args: ""
            before-script: yum install -y cmake llvm-toolset

          # Linux aarch64 — cross-compiled via ghcr.io/rust-cross/manylinux_2_28-cross:aarch64.
          # That container has no Python, so we install python3.12 and pass it explicitly.
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64
            manylinux: "2_28"
            python-args: "-i python3.12"
            before-script: yum install -y cmake llvm-toolset python3.12 python3.12-devel

          # macOS universal2 — fat wheel covering Intel + Apple Silicon.
          # abi3-py39 uses the stable Python C API, so Python 3.14 on the runner is fine.
          - name: macos-universal
            os: macos-latest
            target: universal2-apple-darwin
            manylinux: ""
            python-args: ""
            before-script: ""

          # Windows x86_64 — abi3-py39 handles any Python version on the runner.
          - name: windows-x86_64
            os: windows-latest
            target: x86_64
            manylinux: ""
            python-args: ""
            before-script: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features python ${{ matrix.python-args }}
          manylinux: ${{ matrix.manylinux }}
          before-script-linux: ${{ matrix.before-script }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: dist/*.whl

  # ── Build source distribution (sdist) ────────────────────────────────────
  # Users on unsupported platforms can install from source with:
  #   pip install minigdb --no-binary minigdb
  # They need: Rust toolchain + cmake + C++ compiler.
  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Publish to PyPI ───────────────────────────────────────────────────────
  # Uses OIDC trusted publishing — no API token secret required.
  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "wheels-*"
          merge-multiple: true
          path: dist

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/**

  # ── Create GitHub Release ─────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create releases

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "wheels-*"
          merge-multiple: true
          path: dist

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
