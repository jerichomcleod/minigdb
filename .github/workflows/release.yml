name: Release

# Triggered by pushing a version tag: git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - "v*"

jobs:
  # ── Build wheels for all supported platforms ─────────────────────────────
  build-wheels:
    name: Wheel — ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — built inside manylinux_2_28 container (glibc 2.28+)
          # python-version is empty: the container manages its own Python interpreter.
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64
            manylinux: "2_28"
            python-version: ""
            python-args: ""

          # Linux aarch64 — cross-compiled from x86_64 runner via QEMU
          # python-version is empty: PYO3_CROSS_PYTHON_VERSION handles the ABI target.
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64
            manylinux: "2_28"
            python-version: ""
            python-args: ""

          # macOS universal2 — single fat wheel for Intel + Apple Silicon.
          # Pinned to Python 3.12: GitHub macOS runners ship Python 3.14 which is
          # newer than PyO3 0.22's maximum supported version (3.13).
          - name: macos-universal
            os: macos-latest
            target: universal2-apple-darwin
            manylinux: ""
            python-version: "3.12"
            python-args: "-i python3.12"

          # Windows x86_64 — same Python pin as macOS.
          - name: windows-x86_64
            os: windows-latest
            target: x86_64
            manylinux: ""
            python-version: "3.12"
            python-args: "-i python3.12"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Pin the Python version on macOS/Windows so maturin doesn't pick up
      # Python 3.14 (newer than PyO3 0.22 supports).  Skipped for Linux because
      # the manylinux container manages its own interpreter.
      - uses: actions/setup-python@v5
        if: matrix.python-version != ''
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features python ${{ matrix.python-args }}
          manylinux: ${{ matrix.manylinux }}
          # Install build dependencies inside the manylinux container.
          # cmake:        required by librocksdb-sys (compiles RocksDB from source)
          # clang/clang-devel: required by zstd-sys (uses bindgen >=0.72 which needs libclang)
          before-script-linux: |
            yum install -y cmake clang clang-devel
        env:
          # Required for aarch64 cross-compilation: the cross container has no Python
          # interpreter, so maturin cannot find one automatically.  This env var tells
          # maturin which Python ABI version to target without needing a live interpreter.
          # Kept in sync with the python-version pin used for macOS/Windows.
          PYO3_CROSS_PYTHON_VERSION: "3.12"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: dist/*.whl

  # ── Build source distribution (sdist) ────────────────────────────────────
  # Users on unsupported platforms can install from source with:
  #   pip install minigdb --no-binary minigdb
  # They need: Rust toolchain + cmake + C++ compiler.
  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Publish to PyPI ───────────────────────────────────────────────────────
  # Uses OIDC trusted publishing — no API token secret required.
  # One-time setup on PyPI: Account → Publishing → Add publisher
  #   Project name: minigdb
  #   Owner:        jerichomcleod
  #   Repository:   minigdb
  #   Workflow:     release.yml
  #   Environment:  pypi
  #
  # In GitHub: Settings → Environments → New → name it "pypi"
  # (Optionally add a required reviewer as a manual approval gate.)
  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "wheels-*"
          merge-multiple: true
          path: dist

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/**

  # ── Create GitHub Release ─────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create releases

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "wheels-*"
          merge-multiple: true
          path: dist

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
