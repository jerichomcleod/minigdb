name: Release

# Triggered by pushing a version tag: git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - "v*"

jobs:
  # ── Build wheels for all supported platforms ─────────────────────────────
  build-wheels:
    name: Wheel — ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — quay.io/pypa/manylinux_2_28_x86_64 (AlmaLinux 8).
          # zstd removed from rocksdb features → no zstd-sys → no bindgen → no libclang needed.
          # cmake is required by librocksdb-sys.
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64
            manylinux: "2_28"
            qemu: false

          # Linux aarch64 — uses QEMU + the native quay.io/pypa/manylinux_2_28_aarch64
          # container (which has Python pre-installed) instead of the cross-compilation
          # container (which has no Python and requires -i).
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64
            manylinux: "2_28"
            qemu: true

          # macOS universal2 — fat wheel for Intel + Apple Silicon.
          # PYO3_USE_ABI3_FORWARD_COMPATIBILITY allows building with Python 3.14
          # using the stable ABI (abi3-py39 is already set in Cargo.toml).
          - name: macos-universal
            os: macos-latest
            target: universal2-apple-darwin
            manylinux: ""
            qemu: false

          # Windows x86_64.
          - name: windows-x86_64
            os: windows-latest
            target: x86_64
            manylinux: ""
            qemu: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Required for linux-aarch64: lets maturin-action use the native aarch64
      # manylinux container (which has Python) instead of the cross-compilation
      # container (which does not).
      - uses: docker/setup-qemu-action@v3
        if: matrix.qemu
        with:
          platforms: aarch64

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features python
          manylinux: ${{ matrix.manylinux }}
        env:
          # Allows PyO3 0.22 to build against Python versions newer than its
          # declared maximum (3.13) using the stable ABI.  Required on macOS/Windows
          # runners that have Python 3.14.  Harmless on Linux (env vars are not
          # forwarded into the manylinux Docker container).
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: dist/*.whl

  # ── Build source distribution (sdist) ────────────────────────────────────
  # Users on unsupported platforms can install from source with:
  #   pip install minigdb --no-binary minigdb
  # They need: Rust toolchain + cmake + C++ compiler.
  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Publish to PyPI ───────────────────────────────────────────────────────
  # Uses OIDC trusted publishing — no API token secret required.
  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "wheels-*"
          merge-multiple: true
          path: dist

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/**

  # ── Create GitHub Release ─────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create releases

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "wheels-*"
          merge-multiple: true
          path: dist

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
